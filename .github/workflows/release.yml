name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: "2.2.x"

      - name: Install Dependencies
        run: nimble install -y -d

      - name: Build Binary
        run: nimble build -d:release -y

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          mkdir dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv bridge.exe dist/bridge-windows-latest.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv bridge dist/bridge-macos-latest
          else
            mv bridge dist/bridge-ubuntu-latest
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.os }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/bridge-ubuntu-latest
            release-assets/bridge-macos-latest
            release-assets/bridge-windows-latest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
